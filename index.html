<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EVOLV</title>
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EVOLV">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#080810;--bg2:#0d0d1a;--card:#111120;--card2:#171730;--border:rgba(255,255,255,0.07);
  --green:#00e676;--green2:#00b04a;--green-dim:rgba(0,230,118,0.1);--green-glow:rgba(0,230,118,0.2);
  --text:#f0f0fa;--t2:#8080a0;--t3:#404060;--red:#ff4458;--orange:#ff8c00;
  --nav:68px;--hdr:58px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0}

/* ---- LAYOUT ---- */
#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}

#hdr{
  height:calc(var(--hdr) + var(--st));padding-top:var(--st);
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:var(--st) 18px 0;gap:10px;
  flex-shrink:0;z-index:10;position:relative
}
#hdr .logo{display:flex;align-items:center;gap:8px;flex:1}
#hdr .logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:#fff}
#hdr .hdr-right{display:flex;gap:8px}

#pages{flex:1;overflow:hidden;position:relative}
.page{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:16px 16px calc(var(--nav) + var(--sb) + 16px);display:none;
  -webkit-overflow-scrolling:touch
}
.page.active{display:block}

#nav{
  height:calc(var(--nav) + var(--sb));padding-bottom:var(--sb);
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:flex-start;flex-shrink:0;z-index:10
}
.ni{
  flex:1;height:var(--nav);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;color:var(--t3);transition:color .2s;
  user-select:none;position:relative
}
.ni.active{color:var(--green)}
.ni svg{width:22px;height:22px}
.ni span{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.ni.active::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:24px;height:2px;background:var(--green);border-radius:0 0 2px 2px
}

/* ---- COMPONENTS ---- */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.card.glow{border-color:rgba(0,230,118,.4);box-shadow:0 0 24px var(--green-glow)}

.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 10px}
.sc .si{font-size:18px;margin-bottom:4px}
.sc .sl{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.sc .sv{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:24px;line-height:1.1}
.sc .ss{font-size:10px;color:var(--green);font-weight:600;margin-top:1px}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:48px;padding:0 22px;border:none;border-radius:12px;
  font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;letter-spacing:.8px;
  cursor:pointer;transition:transform .12s,opacity .12s;width:100%
}
.btn:active{transform:scale(.96)}
.bp{background:linear-gradient(135deg,var(--green),var(--green2));color:#000}
.bs{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.bg{background:transparent;color:var(--t2);border:1px solid var(--border)}
.bd{background:rgba(255,68,88,.12);color:var(--red);border:1px solid rgba(255,68,88,.25)}
.btn.sm{height:36px;padding:0 14px;font-size:12px;border-radius:9px}

input,select{
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;font-weight:500;
  padding:11px 13px;width:100%;outline:none;transition:border-color .18s;-webkit-appearance:none
}
input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim)}
input::placeholder{color:var(--t3)}
input[type=date]{color-scheme:dark}
.ig{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.ig label{font-size:11px;color:var(--t2);font-weight:600;letter-spacing:.5px}

.ibtn{
  width:36px;height:36px;border:none;background:var(--card2);border-radius:9px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--t2);transition:all .12s;flex-shrink:0
}
.ibtn:active{transform:scale(.9)}

/* ---- MODAL ---- */
.mo{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;
  display:flex;align-items:flex-end;backdrop-filter:blur(6px);animation:mfade .2s ease
}
@keyframes mfade{from{opacity:0}to{opacity:1}}
.md{
  width:100%;background:var(--bg2);border-radius:22px 22px 0 0;
  border-top:1px solid var(--border);padding:6px 18px calc(var(--sb) + 18px);
  max-height:92vh;overflow-y:auto;animation:mslide .28s cubic-bezier(.32,.72,0,1)
}
@keyframes mslide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:34px;height:3px;background:var(--border);border-radius:2px;margin:8px auto 14px}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:18px}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--t3);margin:16px 0 10px}
.stitle:first-child{margin-top:4px}

/* ---- HOME HERO ---- */
.hero{
  background:linear-gradient(135deg,#0c1520 0%,#0d1c10 100%);
  border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px;
  position:relative;overflow:hidden
}
.hero::before{
  content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;
  background:radial-gradient(circle,var(--green-glow) 0%,transparent 70%);pointer-events:none
}
.hero::after{
  content:'';position:absolute;left:-10px;bottom:-20px;width:80px;height:80px;
  background:radial-gradient(circle,rgba(0,176,74,.15) 0%,transparent 70%);pointer-events:none
}
.hero .hg{font-size:12px;color:var(--t2);margin-bottom:3px;font-weight:500}
.hero .ht{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:26px;margin-bottom:16px;line-height:1.15}
.hero .ht em{color:var(--green);font-style:normal}

/* ---- WORKOUT ITEM ---- */
.wi{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .12s;position:relative;overflow:hidden
}
.wi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--green),var(--green2))}
.wi:active{transform:scale(.98);background:var(--card2)}
.wi-ico{width:42px;height:42px;border-radius:11px;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.wi-info{flex:1;min-width:0}
.wi-name{font-weight:700;font-size:14px;margin-bottom:2px}
.wi-sub{font-size:11px;color:var(--t3)}

/* ---- TIMER ---- */
.tring-wrap{position:relative;width:230px;height:230px;margin:0 auto}
.tring-svg{width:230px;height:230px;transform:rotate(-90deg)}
.tring-bg{fill:none;stroke:var(--card2);stroke-width:10}
.tring-prog{fill:none;stroke-width:10;stroke-linecap:round}
.ttime{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ttime .tn{font-family:'Bebas Neue',sans-serif;font-size:58px;line-height:1;letter-spacing:2px}
.ttime .tl{font-size:10px;color:var(--t3);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}

.tpresets{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:18px 0 14px}
.tp{
  height:33px;padding:0 14px;border:1px solid var(--border);background:var(--card);
  color:var(--t2);border-radius:20px;font-family:'Barlow',sans-serif;font-weight:600;
  font-size:12px;cursor:pointer;transition:all .12s
}
.tp.on,.tp:active{border-color:var(--green);color:var(--green);background:var(--green-dim)}

.tctrls{display:flex;gap:14px;justify-content:center;align-items:center;margin-top:10px}
.tcbtn{border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.tcbtn:active{transform:scale(.9)}
.tcbtn.play{width:72px;height:72px;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;box-shadow:0 4px 28px var(--green-glow)}
.tcbtn.rst{width:52px;height:52px;background:var(--card);color:var(--t2);border:1px solid var(--border)}

/* ---- SERIES COUNTER ---- */
.sc-wrap{text-align:center;padding:16px 0}
.sc-num{
  font-family:'Bebas Neue',sans-serif;font-size:110px;
  line-height:1;color:var(--text);transition:transform .15s,color .15s;display:inline-block
}
.sc-num.bump{transform:scale(1.18)!important}
.sc-lbl{font-size:11px;color:var(--t3);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.sc-btns{display:flex;gap:14px;justify-content:center;margin-top:20px}
.scbtn{border-radius:50%;border:none;cursor:pointer;transition:transform .12s;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700}
.scbtn:active{transform:scale(.9)}
.scbtn.plus{width:80px;height:80px;font-size:38px;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;box-shadow:0 4px 28px var(--green-glow)}
.scbtn.minus{width:58px;height:58px;font-size:28px;background:var(--card);color:var(--t2);border:1px solid var(--border)}

/* ---- ACTIVE WORKOUT ---- */
#aw{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;overflow:hidden}
#aw.open{display:flex}
.aw-hdr{padding:calc(var(--st) + 14px) 18px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.aw-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.aw-sub{font-size:11px;color:var(--t3)}
.aw-timer{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green);flex-shrink:0}
.pbar-wrap{height:3px;background:var(--card2);flex-shrink:0}
.pbar{height:3px;background:linear-gradient(to right,var(--green),var(--green2));transition:width .4s ease}
.aw-body{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.aw-ftr{padding:14px 14px calc(var(--sb) + 14px);border-top:1px solid var(--border);display:flex;gap:9px;flex-shrink:0}

.ex-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.ex-card.glow{border-color:rgba(0,230,118,.35);box-shadow:0 0 18px var(--green-glow)}
.ex-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ex-name{font-weight:700;font-size:15px}
.ex-tag{font-size:10px;padding:3px 8px;border-radius:6px;background:var(--green-dim);color:var(--green);font-weight:700;letter-spacing:.5px}
.sets-hdr{display:grid;grid-template-columns:26px 1fr 1fr 34px;gap:7px;margin-bottom:6px}
.sets-hdr span{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.5px}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 34px;gap:7px;margin-bottom:7px;align-items:center}
.set-row .sn{font-size:11px;color:var(--t3);font-weight:700;text-align:center}
.set-row input{height:36px;padding:0 8px;font-size:14px;font-weight:600;text-align:center}
.set-chk{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:14px;flex-shrink:0}
.set-chk.done{background:var(--green);border-color:var(--green);color:#000}

/* ---- WEIGHT HISTORY ---- */
.prow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.pdate{flex:1}
.pd1{font-size:13px;font-weight:600}
.pd2{font-size:10px;color:var(--t3)}
.pval{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px}
.pdif{font-size:11px;font-weight:700;min-width:36px;text-align:right}
.pdif.up{color:var(--red)}.pdif.dn{color:var(--green)}.pdif.eq{color:var(--t3)}
.del{width:30px;height:30px;border:none;background:rgba(255,68,88,.1);color:var(--red);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.del:active{transform:scale(.88)}

/* ---- CHARTS ---- */
.cwrap{position:relative;height:170px;margin:10px 0 4px}

/* ---- EMPTY ---- */
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
.empty .ei{font-size:44px;margin-bottom:10px}
.empty .et{font-size:15px;font-weight:700;color:var(--t2);margin-bottom:5px}
.empty .es{font-size:12px;line-height:1.5}

/* ---- TOAST ---- */
.toast{
  position:fixed;bottom:calc(var(--nav) + var(--sb) + 14px);left:50%;
  transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);
  border-radius:11px;padding:11px 18px;font-size:13px;font-weight:600;z-index:500;
  animation:tin .25s ease,tout .25s ease 2.2s forwards;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5)
}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* ---- FICHA CARD ---- */
.fc{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px}
.fc-head{padding:14px 16px;display:flex;align-items:center;gap:10px}
.fc-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;flex:1}
.fc-sub{font-size:11px;color:var(--t3)}
.fc-day{border-top:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.fc-day:active{background:var(--card2)}
.fc-dn{width:28px;height:28px;border-radius:7px;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--green);flex-shrink:0}
.fc-di{flex:1;min-width:0}
.fc-dn2{font-weight:600;font-size:13px}
.fc-ds{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---- DAY BLOCK ---- */
.db{background:var(--card2);border-radius:12px;padding:13px;margin-bottom:12px}
.db-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.db-lbl{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--green);white-space:nowrap}
.ex-row{display:grid;grid-template-columns:1fr 46px 46px 28px;gap:5px;margin-bottom:7px;align-items:center}
.ex-row input{height:34px;font-size:12px;padding:0 8px}

/* ---- SEGMENT ---- */
.seg{display:flex;background:var(--card2);border-radius:10px;padding:3px;margin-bottom:16px}
.seg-btn{flex:1;height:34px;border:none;border-radius:8px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:12px;letter-spacing:.5px;color:var(--t2);background:transparent;transition:all .15s}
.seg-btn.on{background:var(--card);color:var(--text)}
</style>
</head>
<body>
<div id="app">
<!-- HEADER -->
<div id="hdr" style="height:calc(58px + var(--st));padding-top:var(--st)">
  <div class="logo">
    <img src="logo.png" alt="EVOLV" style="width:38px;height:38px;border-radius:9px;object-fit:cover;">
    <span class="logo-text">EVOLV</span>
  </div>
  <div class="hdr-right" id="hdr-right"></div>
</div>

<!-- PAGES -->
<div id="pages">
  <!-- HOME -->
  <div class="page active" id="pg-home">
    <div class="hero">
      <div class="hg" id="hero-greet">Bom treino! 💪</div>
      <div class="ht" style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;">Sua evolução <em>começa aqui.</em></div>
      <button class="btn bp" onclick="App.startTodayWorkout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        INICIAR TREINO
      </button>
    </div>
    <div class="srow" id="home-stats"></div>
    <div class="stitle">ÚLTIMOS TREINOS</div>
    <div id="home-recent"></div>
  </div>

  <!-- FICHAS -->
  <div class="page" id="pg-fichas">
    <div id="fichas-list"></div>
    <button class="btn bp" onclick="App.showAddFicha()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      NOVA FICHA
    </button>
  </div>

  <!-- TIMER + SÉRIES -->
  <div class="page" id="pg-timer">
    <div class="seg" id="timer-seg">
      <button class="seg-btn on" onclick="App.showTimerTab(0)">Intervalo</button>
      <button class="seg-btn" onclick="App.showTimerTab(1)">Séries</button>
    </div>

    <!-- INTERVAL TIMER -->
    <div id="tab-interval">
      <div class="card">
        <div class="tring-wrap">
          <svg class="tring-svg" viewBox="0 0 230 230">
            <defs>
              <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#00e676"/>
                <stop offset="100%" stop-color="#00b04a"/>
              </linearGradient>
            </defs>
            <circle class="tring-bg" cx="115" cy="115" r="103"/>
            <circle id="tring" class="tring-prog" cx="115" cy="115" r="103"
              stroke="url(#tg)" stroke-dasharray="647.08" stroke-dashoffset="0"/>
          </svg>
          <div class="ttime">
            <div class="tn" id="tdisplay">01:30</div>
            <div class="tl" id="tstatus">PRONTO</div>
          </div>
        </div>
        <div class="tpresets">
          <button class="tp" onclick="App.setPreset(30)">30s</button>
          <button class="tp" onclick="App.setPreset(45)">45s</button>
          <button class="tp on" onclick="App.setPreset(90)">90s</button>
          <button class="tp" onclick="App.setPreset(120)">2min</button>
          <button class="tp" onclick="App.setPreset(180)">3min</button>
        </div>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
          <input type="number" id="cmin" placeholder="min" style="width:78px;text-align:center" min="0" max="59" value="1" oninput="App.setCustomTime()">
          <span style="line-height:44px;color:var(--t3);font-weight:700">:</span>
          <input type="number" id="csec" placeholder="seg" style="width:78px;text-align:center" min="0" max="59" value="30" oninput="App.setCustomTime()">
        </div>
        <div class="tctrls">
          <button class="tcbtn rst" onclick="App.resetTimer()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.34"/></svg>
          </button>
          <button class="tcbtn play" id="tplaybtn" onclick="App.toggleTimer()">
            <svg id="tplayico" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- SERIES COUNTER -->
    <div id="tab-series" style="display:none">
      <div class="card">
        <div style="font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2.5px;color:var(--t3);font-weight:700;text-align:center;margin-bottom:4px">SÉRIES REALIZADAS</div>
        <div class="sc-wrap">
          <div class="sc-num" id="sc-num">0</div>
          <div class="sc-lbl">séries</div>
        </div>
        <div class="sc-btns">

<!-- ACTIVE WORKOUT OVERLAY -->
<div id="aw">

      FINALIZAR TREINO
    </button>
  </div>

<!-- MODAL ROOT -->
<div id="mroot"></div>

<script>
// ═══════════════════════════════ DB ═══════════════════════════════
const DB = {
  g:(k,d=[])=>{try{return JSON.parse(localStorage.getItem('ev_'+k))??d}catch{return d}},
  s:(k,v)=>localStorage.setItem('ev_'+k,JSON.stringify(v)),
  fichas:()=>DB.g('fichas'),
  setFichas:v=>DB.s('fichas',v),
  sessoes:()=>DB.g('sessoes'),
  setSessoes:v=>DB.s('sessoes',v),
  pesos:()=>DB.g('pesos'),
  setPesos:v=>DB.s('pesos',v),
};

// ═══════════════════════════════ STATE ═══════════════════════════
const S = {
  page:'home',
  timerTab:0,
  series:0,
  timer:{total:90,rem:90,running:false,iv:null},
  workout:{on:false,fichaId:null,dayIdx:null,t0:null,iv:null,exs:[]},
  charts:{}
};

// ═══════════════════════════════ UTILS ════════════════════════════
const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const ft=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const fd=d=>new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
const today=()=>new Date().toISOString().slice(0,10);
const chartDef={
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{enabled:true,backgroundColor:'#1a1a30',titleColor:'#fff',bodyColor:'#a0a0c0',borderColor:'rgba(255,255,255,.08)',borderWidth:1,padding:10,cornerRadius:8}},
  scales:{
    x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#404060',font:{size:9}}},
    y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#404060',font:{size:9}},beginAtZero:true}
  }
};

// ═══════════════════════════════ APP ══════════════════════════════
const App = {

nav(p){
  S.page=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  $('pg-'+p).classList.add('active');
  document.querySelector(`[data-p="${p}"]`).classList.add('active');
  App.render(p);
},

render(p){
  if(p==='home')App.renderHome();
  else if(p==='fichas')App.renderFichas();
  else if(p==='stats')App.renderStats();
  else if(p==='peso'){App.renderPeso();if(!$('p-date').value)$('p-date').value=today();}
},

// ─── GREET ────────────────────────────────────────────────
setGreet(){
  const h=new Date().getHours();
  const g=h<12?'☀️ Bom dia!':h<18?'💪 Boa tarde!':'🌙 Boa noite!';
  const el=$('hero-greet');if(el)el.textContent=g;
},

// ─── HOME ─────────────────────────────────────────────────
renderHome(){
  App.setGreet();
  const sess=DB.sessoes(),pesos=DB.pesos();
  const now=new Date();
  const wk=sess.filter(s=>(now-new Date(s.date))/864e5<=7);
  const mo=sess.filter(s=>{const d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const vol=mo.reduce((a,s)=>a+(s.exs||[]).reduce((b,e)=>b+(e.sets||[]).filter(x=>x.done).reduce((c,x)=>c+(+x.reps||0)*(+x.w||0),0),0),0);
  const lp=pesos.length?pesos[pesos.length-1]:null;
  $('home-stats').innerHTML=`
    <div class="sc"><div class="si">🏋️</div><div class="sl">SEMANA</div><div class="sv">${wk.length}</div><div class="ss">treinos</div></div>
    <div class="sc"><div class="si">📊</div><div class="sl">VOLUME</div><div class="sv">${vol>=1000?(vol/1000).toFixed(1)+'t':vol+'kg'}</div><div class="ss">este mês</div></div>
    <div class="sc"><div class="si">⚖️</div><div class="sl">PESO</div><div class="sv">${lp?lp.w+'kg':'--'}</div><div class="ss">${lp?fd(lp.date):'sem dados'}</div></div>
  `;
  const rec=sess.slice(-5).reverse();
  if(!rec.length){$('home-recent').innerHTML='<div class="empty"><div class="ei">🌱</div><div class="et">Nenhum treino registrado</div><div class="es">Inicie um treino para ver<br>seu histórico aqui.</div></div>';return;}
  const fichas=DB.fichas();
  $('home-recent').innerHTML=rec.map(s=>{
    const f=fichas.find(f=>f.id===s.fichaId);
    const d=f?.days?.[s.dayIdx];
    const v=(s.exs||[]).reduce((a,e)=>a+(e.sets||[]).filter(x=>x.done).reduce((b,x)=>b+(+x.reps||0)*(+x.w||0),0),0);
    return `<div class="wi"><div class="wi-ico">💪</div><div class="wi-info"><div class="wi-name">${d?.name||f?.name||'Treino'}</div><div class="wi-sub">${fd(s.date)} · ${(s.exs||[]).length} exercícios · ${v}kg</div></div><div style="font-size:11px;color:var(--t3)">${ft(s.dur||0)}</div></div>`;
  }).join('');
},

// ─── FICHAS ───────────────────────────────────────────────
renderFichas(){
  const fichas=DB.fichas();
  if(!fichas.length){$('fichas-list').innerHTML='<div class="empty"><div class="ei">📋</div><div class="et">Nenhuma ficha criada</div><div class="es">Crie sua primeira ficha de treino.</div></div>';return;}
  $('fichas-list').innerHTML=fichas.map(f=>`
    <div class="fc">
      <div class="fc-head">
        <div style="flex:1"><div class="fc-title">${f.name}</div><div class="fc-sub">${f.days?.length||0} dias · ${(f.days||[]).reduce((a,d)=>a+(d.exs||[]).length,0)} exercícios</div></div>
        <button class="ibtn" onclick="App.editFicha('${f.id}')" title="Editar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
        </button>
        <button class="del" onclick="App.delFicha('${f.id}')" style="margin-left:4px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
      ${(f.days||[]).map((d,di)=>`
        <div class="fc-day" onclick="App.startWorkout('${f.id}',${di})">
          <div class="fc-dn">${di+1}</div>
          <div class="fc-di"><div class="fc-dn2">${d.name}</div><div class="fc-ds">${(d.exs||[]).map(e=>e.name).join(', ').slice(0,60)||'—'}</div></div>
          <button class="btn bp sm" style="width:auto;padding:0 12px" onclick="event.stopPropagation();App.startWorkout('${f.id}',${di})">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
        </div>
      `).join('')}
    </div>
  `).join('');
},

// ─── ADD / EDIT FICHA ─────────────────────────────────────
showAddFicha(ficha=null){
  const m=document.createElement('div');
  m.className='mo';m.id='m-ficha';
  m.innerHTML=`
    <div class="md">
      <div class="mhandle"></div>
      <div class="mtitle">${ficha?'Editar Ficha':'Nova Ficha'}</div>
      <div class="ig"><label>Nome da ficha</label><input type="text" id="f-name" placeholder="ex: Hipertrofia ABC" value="${ficha?.name||''}"></div>
      <div id="f-days"></div>
      <button class="btn bg" onclick="App.addDay()" style="margin-bottom:11px">+ Adicionar Dia</button>
      <button class="btn bp" onclick="App.saveFicha('${ficha?.id||''}')">SALVAR</button>
      <button class="btn bg" onclick="App.closeModal()" style="margin-top:8px">Cancelar</button>
    </div>
  `;
  m.addEventListener('click',e=>{if(e.target===m)App.closeModal();});
  $('mroot').appendChild(m);
  setTimeout(()=>$('f-name')?.focus(),300);
  if(ficha){
    (ficha.days||[]).forEach(day=>{
      App.addDay();
      const blocks=document.querySelectorAll('#f-days .db');
      const b=blocks[blocks.length-1];
      b.querySelector('.db-name').value=day.name||'';
      (day.exs||[]).forEach(ex=>{
        App.addExRow(b.querySelector('.ex-list'));
        const rows=b.querySelectorAll('.ex-row');
        const r=rows[rows.length-1];
        r.querySelector('.en').value=ex.name||'';
        r.querySelector('.es').value=ex.sets||3;
        r.querySelector('.er').value=ex.reps||12;
      });
    });
  }
},

addDay(){
  const cont=$('f-days');
  const n=cont.querySelectorAll('.db').length+1;
  const db=document.createElement('div');
  db.className='db';
  db.innerHTML=`
    <div class="db-hdr">
      <span class="db-lbl">DIA ${n}</span>
      <input type="text" class="db-name" placeholder="Nome (ex: Peito/Tríceps)" style="flex:1;height:32px;font-size:12px;margin-left:8px">
      <button style="width:26px;height:26px;border:none;background:rgba(255,68,88,.1);color:var(--red);border-radius:7px;cursor:pointer;font-size:16px;margin-left:6px;flex-shrink:0" onclick="this.closest('.db').remove()">×</button>
    </div>
    <div class="ex-list" style="margin-bottom:8px"></div>
    <button class="btn bg sm" onclick="App.addExRow(this.previousElementSibling)" style="width:auto;padding:0 12px">+ Exercício</button>
  `;
  cont.appendChild(db);
},

addExRow(list){
  const r=document.createElement('div');
  r.className='ex-row';
  r.innerHTML=`
    <input type="text" class="en" placeholder="Exercício">
    <input type="number" class="es" placeholder="Sér" value="3" min="1" max="30" style="text-align:center">
    <input type="number" class="er" placeholder="Rep" value="12" min="1" max="100" style="text-align:center">
    <button style="width:28px;height:28px;border:none;background:rgba(255,68,88,.1);color:var(--red);border-radius:7px;cursor:pointer;font-size:16px;flex-shrink:0" onclick="this.parentElement.remove()">×</button>
  `;
  list.appendChild(r);
},

saveFicha(editId){
  const name=$('f-name')?.value?.trim();
  if(!name){App.toast('📝 Digite o nome da ficha');return;}
  const days=[...document.querySelectorAll('#f-days .db')].map((b,i)=>{
    const dname=b.querySelector('.db-name')?.value?.trim()||`Dia ${i+1}`;
    const exs=[...b.querySelectorAll('.ex-row')].map(r=>({
      name:r.querySelector('.en')?.value?.trim()||'',
      sets:+r.querySelector('.es')?.value||3,
      reps:+r.querySelector('.er')?.value||12,
      w:0
    })).filter(e=>e.name);
    return{name:dname,exs};
  });
  const fichas=DB.fichas();
  if(editId){const i=fichas.findIndex(f=>f.id===editId);if(i>=0)fichas[i]={...fichas[i],name,days};}
  else fichas.push({id:uid(),name,days,at:Date.now()});
  DB.setFichas(fichas);
  App.closeModal();App.renderFichas();
  App.toast(editId?'✅ Ficha atualizada!':'🎯 Ficha criada!');
},

editFicha(id){const f=DB.fichas().find(x=>x.id===id);if(f)App.showAddFicha(f);},
delFicha(id){if(!confirm('Excluir esta ficha?'))return;DB.setFichas(DB.fichas().filter(f=>f.id!==id));App.renderFichas();App.toast('🗑️ Ficha excluída');},

// ─── WORKOUT ──────────────────────────────────────────────
startTodayWorkout(){
  const fichas=DB.fichas();
  if(!fichas.length){App.toast('📋 Crie uma ficha de treino primeiro!');App.nav('fichas');return;}
  App.showPickModal();
},

showPickModal(){
  const fichas=DB.fichas();
  const m=document.createElement('div');
  m.className='mo';
  m.innerHTML=`
    <div class="md">
      <div class="mhandle"></div>
      <div class="mtitle">Selecionar Treino</div>
      ${fichas.map(f=>`
        <div style="margin-bottom:12px">
          <div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px;margin-bottom:6px">${f.name.toUpperCase()}</div>
          ${(f.days||[]).map((d,di)=>`
            <div class="wi" style="margin-bottom:6px" onclick="App.startWorkout('${f.id}',${di});App.closeModal()">
              <div class="wi-ico">💪</div>
              <div class="wi-info"><div class="wi-name">${d.name}</div><div class="wi-sub">${(d.exs||[]).length} exercícios</div></div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="color:var(--green)"><polygon points="5,3 19,12 5,21"/></svg>
            </div>
          `).join('')}
        </div>
      `).join('')}
      <button class="btn bg" onclick="App.closeModal()">Cancelar</button>
    </div>
  `;
  m.addEventListener('click',e=>{if(e.target===m)App.closeModal();});
  $('mroot').appendChild(m);
},

startWorkout(fichaId,dayIdx){
  const f=DB.fichas().find(x=>x.id===fichaId);
  const d=f?.days?.[dayIdx];if(!d)return;
  App.closeModal();
  S.workout={
    on:true,fichaId,dayIdx,t0:Date.now(),iv:null,
    exs:(d.exs||[]).map(e=>({
      name:e.name,ts:e.sets||3,tr:e.reps||12,
      sets:Array.from({length:e.sets||3},()=>({reps:e.reps||12,w:0,done:false}))
    }))
  };
  $('aw').classList.add('open');
  $('aw-title').textContent=d.name;
  S.workout.iv=setInterval(()=>{
    const el=$('aw-timer');if(el)el.textContent=ft(Math.floor((Date.now()-S.workout.t0)/1000));
  },1000);
  App.renderAW();
},

renderAW(){
  const{exs}=S.workout;
  const done=exs.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  const total=exs.reduce((a,e)=>a+e.sets.length,0);
  $('aw-sub').textContent=`${exs.length} exercícios · ${done}/${total} séries concluídas`;
  $('aw-pbar').style.width=total?`${(done/total)*100}%`:'0%';
  $('aw-body').innerHTML=exs.map((ex,ei)=>`
    <div class="ex-card ${ex.sets.every(s=>s.done)?'glow':''}">
      <div class="ex-hdr">
        <div class="ex-name">${ex.name}</div>
        <span class="ex-tag">${ex.sets.filter(s=>s.done).length}/${ex.sets.length} séries</span>
      </div>
      <div class="sets-hdr"><span></span><span>Carga (kg)</span><span>Reps</span><span></span></div>
      ${ex.sets.map((s,si)=>`
        <div class="set-row">
          <div class="sn">${si+1}</div>
          <input type="number" value="${s.w||''}" placeholder="0" min="0" step="0.5"
            onchange="App.updSet(${ei},${si},'w',this.value)"
            style="${s.done?'opacity:.45':''}">
          <input type="number" value="${s.reps||''}" placeholder="${ex.tr}" min="1"
            onchange="App.updSet(${ei},${si},'reps',this.value)"
            style="${s.done?'opacity:.45':''}">
          <div class="set-chk ${s.done?'done':''}" onclick="App.togSet(${ei},${si})">${s.done?'✓':''}</div>
        </div>
      `).join('')}
      <button class="btn bg sm" onclick="App.addSet(${ei})" style="width:auto;padding:0 11px;margin-top:6px">+ Série</button>
    </div>
  `).join('');
},

updSet(ei,si,f,v){S.workout.exs[ei].sets[si][f]=+v;},
togSet(ei,si){
  const s=S.workout.exs[ei].sets[si];
  s.done=!s.done;
  App.renderAW();
  if(s.done){App.addSeries(1);App.resetTimer();App.startTimer();App.toast('⏱️ Timer iniciado!');}
},
addSet(ei){const e=S.workout.exs[ei];e.sets.push({reps:e.tr,w:0,done:false});App.renderAW();},

cancelWorkout(){if(!confirm('Descartar treino?'))return;App._endWO(false);},
finishWorkout(){App._endWO(true);},
_endWO(save){
  clearInterval(S.workout.iv);
  if(save){
    const sess=DB.sessoes();
    sess.push({id:uid(),fichaId:S.workout.fichaId,dayIdx:S.workout.dayIdx,date:new Date().toISOString(),dur:Math.floor((Date.now()-S.workout.t0)/1000),exs:S.workout.exs.map(e=>({name:e.name,sets:e.sets}))});
    DB.setSessoes(sess);
    App.toast('🏆 Treino concluído!');
    App.resetSeries();
  }
  $('aw').classList.remove('open');
  S.workout={on:false};
  if(S.page==='home')App.renderHome();
},

// ─── TIMER ────────────────────────────────────────────────
showTimerTab(i){
  S.timerTab=i;
  document.querySelectorAll('.seg-btn').forEach((b,bi)=>b.classList.toggle('on',bi===i));
  $('tab-interval').style.display=i===0?'block':'none';
  $('tab-series').style.display=i===1?'block':'none';
},

setPreset(s){
  if(S.timer.running)App.stopTimer();
  S.timer.total=s;S.timer.rem=s;
  App.updTimer();
  document.querySelectorAll('.tp').forEach(b=>b.classList.remove('on'));
  const ps=[30,45,90,120,180];const i=ps.indexOf(s);
  if(i>=0)document.querySelectorAll('.tp')[i].classList.add('on');
  const min=Math.floor(s/60),sec=s%60;
  const cm=$('cmin'),cs=$('csec');if(cm)cm.value=min;if(cs)cs.value=sec;
},

setCustomTime(){
  const m=+($('cmin')?.value||0),s=+($('csec')?.value||0),t=m*60+s;
  if(t>0){if(S.timer.running)App.stopTimer();S.timer.total=t;S.timer.rem=t;App.updTimer();document.querySelectorAll('.tp').forEach(b=>b.classList.remove('on'));}
},

toggleTimer(){S.timer.running?App.stopTimer():App.startTimer();},

startTimer(){
  if(S.timer.rem<=0)S.timer.rem=S.timer.total;
  S.timer.running=true;
  const s=$('tstatus');if(s)s.textContent='CONTANDO';
  const ico=$('tplayico');if(ico)ico.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  S.timer.iv=setInterval(()=>{
    S.timer.rem--;
    App.updTimer();
    if(S.timer.rem<=0){
      App.stopTimer();
      const st=$('tstatus');if(st)st.textContent='TEMPO!';
      if(navigator.vibrate)navigator.vibrate([250,100,250,100,250]);
      App.toast('⏱️ Intervalo finalizado!');
    }
  },1000);
},

stopTimer(){
  S.timer.running=false;clearInterval(S.timer.iv);
  const ico=$('tplayico');if(ico)ico.innerHTML='<polygon points="5,3 19,12 5,21"/>';
  const st=$('tstatus');if(st)st.textContent=S.timer.rem>0?'PAUSADO':'PRONTO';
},

resetTimer(){
  App.stopTimer();S.timer.rem=S.timer.total;App.updTimer();
  const st=$('tstatus');if(st)st.textContent='PRONTO';
},

updTimer(){
  const{total,rem}=S.timer;
  const d=$('tdisplay'),r=$('tring');
  if(d)d.textContent=ft(rem);
  if(r){
    const C=647.08,p=total>0?rem/total:1;
    r.style.strokeDasharray=C;r.style.strokeDashoffset=C*(1-p);
    r.setAttribute('stroke',rem<=10&&rem>0?'#ff4458':'url(#tg)');
  }
},

// ─── SERIES ───────────────────────────────────────────────
addSeries(d){
  S.series=Math.max(0,S.series+d);
  const el=$('sc-num');
  if(el){
    el.textContent=S.series;
    el.style.color=S.series>0?'var(--green)':'var(--text)';
    el.classList.add('bump');setTimeout(()=>el.classList.remove('bump'),160);
  }
},
resetSeries(){S.series=0;const el=$('sc-num');if(el){el.textContent=0;el.style.color='var(--text)';}},

// ─── STATS ────────────────────────────────────────────────
renderStats(){
  const sess=DB.sessoes(),pesos=DB.pesos();
  if(!sess.length&&!pesos.length){
    $('stats-content').innerHTML='<div class="empty"><div class="ei">📈</div><div class="et">Sem dados ainda</div><div class="es">Registre treinos e pesagens<br>para ver suas estatísticas.</div></div>';
    return;
  }
  const total=sess.length;
  const vol=sess.reduce((a,s)=>a+(s.exs||[]).reduce((b,e)=>b+(e.sets||[]).filter(x=>x.done).reduce((c,x)=>c+(+x.reps||0)*(+x.w||0),0),0),0);
  const series=sess.reduce((a,s)=>a+(s.exs||[]).reduce((b,e)=>b+(e.sets||[]).filter(x=>x.done).length,0),0);
  const now=new Date();
  const wkL=[],wkD=[];
  for(let i=7;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i*7);
    const s=new Date(d);s.setDate(d.getDate()-d.getDay());
    const e2=new Date(s);e2.setDate(s.getDate()+6);
    wkD.push(sess.filter(x=>{const xd=new Date(x.date);return xd>=s&&xd<=e2;}).length);
    wkL.push(i===0?'Esta':`S-${i}`);
  }
  const moL=[],moD=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now);d.setMonth(d.getMonth()-i);
    moL.push(d.toLocaleDateString('pt-BR',{month:'short'}));
    const v=sess.filter(s=>{const sd=new Date(s.date);return sd.getMonth()===d.getMonth()&&sd.getFullYear()===d.getFullYear();})
      .reduce((a,s)=>a+(s.exs||[]).reduce((b,e)=>b+(e.sets||[]).filter(x=>x.done).reduce((c,x)=>c+(+x.reps||0)*(+x.w||0),0),0),0);
    moD.push(Math.round(v));
  }
  $('stats-content').innerHTML=`
    <div class="srow">
      <div class="sc"><div class="si">🏆</div><div class="sl">TREINOS</div><div class="sv">${total}</div><div class="ss">total</div></div>
      <div class="sc"><div class="si">📦</div><div class="sl">VOLUME</div><div class="sv">${vol>=1000?(vol/1000).toFixed(0)+'t':vol+'kg'}</div><div class="ss">total</div></div>
      <div class="sc"><div class="si">🔥</div><div class="sl">SÉRIES</div><div class="sv">${series}</div><div class="ss">total</div></div>
    </div>
    <div class="stitle">FREQUÊNCIA SEMANAL</div>
    <div class="card"><div class="cwrap"><canvas id="ch-wk"></canvas></div></div>
    <div class="stitle">VOLUME MENSAL (kg)</div>
    <div class="card"><div class="cwrap"><canvas id="ch-mo"></canvas></div></div>
    ${pesos.length>=2?`<div class="stitle">EVOLUÇÃO DO PESO</div><div class="card"><div class="cwrap"><canvas id="ch-pe"></canvas></div></div>`:''}
  `;
  setTimeout(()=>{
    Object.values(S.charts).forEach(c=>{try{c.destroy()}catch{}});
    S.charts={};
    if($('ch-wk'))S.charts.wk=new Chart($('ch-wk'),{type:'bar',data:{labels:wkL,datasets:[{data:wkD,backgroundColor:wkD.map((_,i)=>i===7?'rgba(0,230,118,.85)':'rgba(0,230,118,.25)'),borderRadius:6,borderSkipped:false}]},options:chartDef});
    if($('ch-mo'))S.charts.mo=new Chart($('ch-mo'),{type:'bar',data:{labels:moL,datasets:[{data:moD,backgroundColor:'rgba(0,230,118,.28)',borderColor:'#00e676',borderWidth:1,borderRadius:6,borderSkipped:false}]},options:chartDef});
    if($('ch-pe')&&pesos.length>=2){
      const lp=pesos.slice(-12);
      const opts={...chartDef,scales:{...chartDef.scales,y:{...chartDef.scales.y,beginAtZero:false}}};
      S.charts.pe=new Chart($('ch-pe'),{type:'line',data:{labels:lp.map(p=>fd(p.date)),datasets:[{data:lp.map(p=>p.w),borderColor:'#00e676',backgroundColor:'rgba(0,230,118,.07)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#00e676'}]},options:opts});
    }
  },50);
},

// ─── PESO ─────────────────────────────────────────────────
renderPeso(){
  const pesos=DB.pesos();
  if(S.charts.peso){try{S.charts.peso.destroy()}catch{}delete S.charts.peso;}
  const cwrap=$('peso-chart');
  if(pesos.length>=2&&cwrap){
    const last=pesos.slice(-24);
    setTimeout(()=>{
      S.charts.peso=new Chart(cwrap,{type:'line',data:{labels:last.map(p=>fd(p.date)),datasets:[{data:last.map(p=>p.w),borderColor:'#00e676',backgroundColor:'rgba(0,230,118,.07)',fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#00e676'}]},options:{...chartDef,scales:{...chartDef.scales,y:{...chartDef.scales.y,beginAtZero:false}}}});
    },50);
  }else if(cwrap){cwrap.parentElement.innerHTML='<div style="height:80px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px">Registre ao menos 2 pesagens para ver o gráfico</div>';}
  const hist=$('peso-hist');
  if(!pesos.length){hist.innerHTML='<div class="empty" style="padding:24px"><div class="ei">⚖️</div><div class="et">Nenhuma pesagem</div></div>';return;}
  hist.innerHTML=pesos.slice(-30).reverse().map((p,i,arr)=>{
    const prev=arr[i+1];
    const diff=prev?(p.w-prev.w).toFixed(1):null;
    const cls=diff===null?'eq':+diff>0?'up':'dn';
    return `
      <div class="prow">
        <div class="pdate"><div class="pd1">${fd(p.date)}</div><div class="pd2">${p.period||''} ${p.obs||''}</div></div>
        <div class="pval">${p.w} kg</div>
        <div class="pdif ${cls}">${diff!==null?(+diff>0?'+':'')+diff:'—'}</div>
        <button class="del" onclick="App.delPeso('${p.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    `;
  }).join('');
},

savePeso(){
  const w=parseFloat($('p-weight')?.value);
  const date=$('p-date')?.value||today();
  const obs=$('p-obs')?.value?.trim()||'';
  const period=$('p-period')?.value||'';
  if(!w||w<30||w>300){App.toast('⚠️ Informe um peso válido');return;}
  const pesos=DB.pesos();
  pesos.push({id:uid(),w,date,obs,period});
  pesos.sort((a,b)=>a.date.localeCompare(b.date));
  DB.setPesos(pesos);
  $('p-weight').value='';$('p-obs').value='';$('p-period').value='';
  App.toast(`⚖️ ${w} kg registrado!`);
  App.renderPeso();
},
delPeso(id){DB.setPesos(DB.pesos().filter(p=>p.id!==id));App.renderPeso();},
